  <script>
    /**
     * 🚀 CONNECTION WARMUP & ROLE PREDICTION
     * This script runs before the main app bundle to eliminate ~200ms of idle time.
     */
    (function() {
      // 1. Warm up the API connection (pre-resolve SSL/TLS)


      // 2. Predictive Chunk Loading
      // We check the role from storage to pre-load the right dashboard JS immediately.
      try {
        const lastRole = localStorage.getItem('swipess_user_role') || 'client';
        // We can't know the exact hash here without a complex build setup, 
        // but we can signal the browser to prioritize the eventual fetch.
        window.__PREDICTED_ROLE = lastRole;
      } catch(e) {}
      
      const theme = 'dark'; // Force dark for initial paint
      const root = document.documentElement;
      root.classList.add(theme, 'black-matte');
      root.style.backgroundColor = '#000000';
      root.style.colorScheme = 'dark';
      
      // Passive touch patching deferred to requestIdleCallback
      (window.requestIdleCallback || setTimeout)(function() {
        var orig = window.EventTarget.prototype.addEventListener;
        window.EventTarget.prototype.addEventListener = function(type, listener, options) {
          var op = options;
          if (type === 'touchstart' || type === 'touchmove') {
            if (typeof options === 'boolean') op = { capture: options, passive: true };
            else if (typeof options === 'object') op = { ...options, passive: true };
            else op = { passive: true };
          }
          orig.call(this, type, listener, op);
        };
      });
    })();
  </script>

  <!-- Fonts: using system font stack for instant LCP -->

  <style id="splash-styles">
    *{touch-action:manipulation;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
    input,textarea,select,[contenteditable="true"]{-webkit-user-select:text;user-select:text;touch-action:auto}
    :root{--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px)}
    html,body{margin:0;padding:0;overflow:hidden;background:#000;width:100%;height:100%;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',system-ui,sans-serif;-webkit-font-smoothing:antialiased}

    #initial-loader{
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      width:100vw;height:100dvh;background:#000;
      position:fixed;top:0;left:0;z-index:9999;
    }

    /* Premium shimmer sweep across the logo */
    .splash-logo-wrap{
      position:relative;display:inline-block;overflow:hidden;
    }
    .splash-logo-wrap::after{
      content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;
      background:linear-gradient(105deg,transparent 30%,rgba(255,255,255,0.25) 50%,transparent 70%);
      animation:logo-shimmer 2.4s ease-in-out infinite;
      pointer-events:none;
    }
    @keyframes logo-shimmer{
      0%{left:-100%}
      60%{left:150%}
      100%{left:150%}
    }

    @keyframes heartbeat{
      0%,100%{transform:scale(1);opacity:1}
      50%{transform:scale(1.02);opacity:0.85}
    }

    #root{opacity:1;background:#000;min-height:100dvh}
  </style>

  <link rel="preload" as="image" href="/icons/Swipess-wordmark-transparent-v2.png" fetchpriority="high">

  <link rel="manifest" href="/manifest.json">

<body>
  <div id="initial-loader">
    <span class="splash-logo-wrap">
      <img src="/icons/Swipess-logo-transparent.png" alt="Swipess" style="width:min(440px, 80vw);height:auto;object-fit:contain;animation:heartbeat 2s ease-in-out infinite;" draggable="false" fetchpriority="high" />
    </span>
  </div>

  <script>
    window.__APP_INITIALIZED__ = false;
    function removeSplash() {
      var loader = document.getElementById('initial-loader');
      var ss = document.getElementById('splash-styles');
      if (loader && loader.parentNode) loader.remove();
      if (ss && ss.parentNode) ss.remove();
    }
    var mountTimer = setTimeout(removeSplash, 400);
    window.addEventListener('app-rendered', function() {
      window.__APP_INITIALIZED__ = true;
      clearTimeout(mountTimer);
      removeSplash();
    });
    // Dynamic theme-color: sync status bar with app theme
    (function(){
      var meta = document.getElementById('theme-color-meta');
      if (!meta) return;
      function sync() {
        var isDark = document.documentElement.classList.contains('dark');
        meta.setAttribute('content', isDark ? '#000000' : '#ffffff');
      }
      sync();
      new MutationObserver(sync).observe(document.documentElement, {attributes:true, attributeFilter:['class']});
    })();
  </script>

  <div id="root"></div>
  <script type="module" src="/src/main.tsx" fetchpriority="high"></script>
</body>
</html>
