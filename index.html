  <script>
    /**
     * 🚀 CONNECTION WARMUP & ROLE PREDICTION
     * This script runs before the main app bundle to eliminate ~200ms of idle time.
     */
    (function() {
      // 1. Warm up the API connection (pre-resolve SSL/TLS)


      // 2. Predictive Chunk Loading
      // We check the role from storage to pre-load the right dashboard JS immediately.
      try {
        const lastRole = localStorage.getItem('swipess_user_role') || 'client';
        // We can't know the exact hash here without a complex build setup, 
        // but we can signal the browser to prioritize the eventual fetch.
        window.__PREDICTED_ROLE = lastRole;
      } catch(e) {}
      
      const theme = 'dark'; // Force dark for initial paint
      const root = document.documentElement;
      root.classList.add(theme, 'black-matte');
      root.style.backgroundColor = '#000000';
      root.style.colorScheme = 'dark';
      
      // Passive touch patching deferred to requestIdleCallback
      (window.requestIdleCallback || setTimeout)(function() {
        var orig = window.EventTarget.prototype.addEventListener;
        window.EventTarget.prototype.addEventListener = function(type, listener, options) {
          var op = options;
          if (type === 'touchstart' || type === 'touchmove') {
            if (typeof options === 'boolean') op = { capture: options, passive: true };
            else if (typeof options === 'object') op = { ...options, passive: true };
            else op = { passive: true };
          }
          orig.call(this, type, listener, op);
        };
      });
    })();
  </script>

  <style>
    .static-splash { position: fixed; inset: 0; background: #000; z-index: 99999; display: flex; align-items: center; justify-content: center; transition: opacity 0.4s ease-out, visibility 0.4s; }
    .static-splash.fade-out { opacity: 0; visibility: hidden; }
    .splash-content { display: flex; flex-direction: column; align-items: center; animation: breathing 2.2s ease-in-out infinite; }
    @keyframes breathing { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.05); opacity: 1; } }
    .splash-logo { height: 40px; width: auto; opacity: 0; transition: opacity 0.3s ease-in; }
    .splash-logo.loaded { opacity: 1; }
    .splash-text { font-family: sans-serif; font-weight: 900; color: #fff; font-style: italic; letter-spacing: -0.05em; text-transform: uppercase; font-size: 24px; }
  </style>

<body>
  <div id="static-splash" class="static-splash">
    <div class="splash-content">
      <img src="/icons/Swipess-wordmark-white.svg" alt="Swipess" class="splash-logo" onload="this.classList.add('loaded')" onerror="this.style.display='none'; document.getElementById('splash-text').style.display='block'" />
      <div id="splash-text" class="splash-text" style="display: none;">Swipess</div>
    </div>
  </div>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx" fetchpriority="high"></script>
  <script>
    (function() {
      const splash = document.getElementById('static-splash');
      const fadeOut = () => {
        if (splash && !splash.classList.contains('fade-out')) {
          splash.classList.add('fade-out');
          setTimeout(() => splash.remove(), 400);
        }
      };
      // Listen for React hydration signal
      window.addEventListener('app-rendered', fadeOut);
      // Fallback: window load + small buffer
      window.addEventListener('load', () => setTimeout(fadeOut, 200));
      // Ultimate safety fallback
      setTimeout(fadeOut, 1500);
    })();
  </script>
</body>
